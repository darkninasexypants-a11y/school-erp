<!-- Parent Sidebar - Only for Parents -->
<div class="sidebar" id="sidebar">
    <div class="sidebar-logo">
        <h4><i class="bi bi-people"></i> <span>Parent Portal</span></h4>
    </div>

    <div class="nav-section">
        <div class="nav-section-title">Dashboard</div>
        <a href="{% url 'students_app:parent_dashboard' %}" class="nav-link {% if request.resolver_match.url_name == 'parent_dashboard' %}active{% endif %}" data-title="Dashboard">
            <i class="bi bi-grid-1x2-fill"></i> <span>Dashboard</span>
        </a>
    </div>

    <div class="nav-section">
        <div class="nav-section-title">My Children</div>
        <a href="{% url 'students_app:parent_dashboard' %}" class="nav-link {% if 'parent' in request.path %}active{% endif %}" data-title="My Children">
            <i class="bi bi-people-fill"></i> <span>My Children</span>
        </a>
    </div>

    <div class="nav-section">
        <div class="nav-section-title">Academic Information</div>
        <a href="{% url 'students_app:parent_dashboard' %}" class="nav-link" data-title="Attendance">
            <i class="bi bi-calendar-check"></i> <span>Attendance</span>
        </a>
        <a href="{% url 'students_app:parent_dashboard' %}" class="nav-link" data-title="Marks">
            <i class="bi bi-clipboard-data"></i> <span>Marks</span>
        </a>
        <a href="{% url 'students_app:view_timetable' %}" class="nav-link {% if 'timetable' in request.path %}active{% endif %}" data-title="Timetable">
            <i class="bi bi-calendar3"></i> <span>Timetable</span>
        </a>
    </div>

    <div class="nav-section" style="margin-top: auto; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1);">
        <a href="{% url 'students_app:parent_logout' %}" class="nav-link text-danger" data-title="Logout" onclick="return confirm('Are you sure you want to logout?');">
            <i class="bi bi-box-arrow-left"></i> <span>Logout</span>
        </a>
    </div>
</div>
