{% extends "students/base_modern.html" %}
{% block title %}Compose Message{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="card">
                <div class="card-header">
                    <h4 class="mb-0"><i class="fas fa-paper-plane me-2"></i>Compose Message</h4>
                </div>
                <div class="card-body">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="recipient" class="form-label">To <span class="text-danger">*</span></label>
                            <select class="form-select" id="recipient" name="recipient" required>
                                <option value="">Select recipient...</option>
                                {% for recipient in recipients %}
                                    <option value="{{ recipient.id }}">{{ recipient.name }} ({{ recipient.type|title }})</option>
                                {% endfor %}
                            </select>
                        </div>
                        
                        {% if related_students %}
                        <div class="mb-3">
                            <label for="related_student" class="form-label">Related Student (Optional)</label>
                            <select class="form-select" id="related_student" name="related_student">
                                <option value="">None</option>
                                {% for student in related_students %}
                                    <option value="{{ student.id }}">{{ student.get_full_name }} - {{ student.get_class_section }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        {% endif %}
                        
                        <div class="mb-3">
                            <label for="subject" class="form-label">Subject <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="subject" name="subject" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="message" class="form-label">Message <span class="text-danger">*</span></label>
                            <textarea class="form-control" id="message" name="message" rows="10" required></textarea>
                        </div>
                        
                        <div class="mb-3">
                            <label for="attachment" class="form-label">Attachment (Optional)</label>
                            <input type="file" class="form-control" id="attachment" name="attachment">
                        </div>
                        
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-paper-plane me-2"></i>Send Message
                            </button>
                            <a href="{% url 'students_app:message_list' %}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
