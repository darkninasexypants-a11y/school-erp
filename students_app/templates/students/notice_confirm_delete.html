{% extends "students/base_modern.html" %}
{% block title %}Delete Notice{% endblock %}

{% block content %}
<div class="container-fluid px-4 py-3">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-danger text-white">
                    <h5 class="mb-0"><i class="fas fa-exclamation-triangle me-2"></i>Delete Notice</h5>
                </div>
                <div class="card-body">
                    <p>Are you sure you want to delete this notice?</p>
                    <div class="alert alert-warning">
                        <strong>{{ notice.title }}</strong>
                        <br>
                        <small class="text-muted">This action cannot be undone.</small>
                    </div>
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">
                            <i class="fas fa-trash me-2"></i>Yes, Delete
                        </button>
                        <a href="{% url 'students_app:notice_detail' notice.id %}" class="btn btn-outline-secondary">
                            <i class="fas fa-times me-2"></i>Cancel
                        </a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
