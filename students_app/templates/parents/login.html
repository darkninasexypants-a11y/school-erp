<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #5f72be 0%, #9b23ea 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.12);
            overflow: hidden;
        }
        .login-header {
            background: linear-gradient(135deg, #5f72be 0%, #9b23ea 100%);
            color: #fff;
            padding: 28px 24px;
        }
        .login-header h4 {
            margin: 0;
            font-weight: 700;
        }
        .login-body {
            padding: 26px 24px 28px;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px 14px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #5f72be 0%, #9b23ea 100%);
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
        }
        .info-text {
            font-size: 0.9rem;
            color: #64748b;
        }
        .messages .alert {
            border-radius: 10px;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header d-flex align-items-center">
            <div class="me-3">
                <i class="fas fa-user-shield fa-2x"></i>
            </div>
            <div>
                <h6 class="mb-1">School ERP</h6>
                <h4 class="mb-0">Parent Login</h4>
            </div>
        </div>
        <div class="login-body">
            <p class="info-text mb-4">
                Sign in with your child's Admission ID and the registered father phone.
            </p>

            {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            </div>
            {% endif %}

            <form method="post" novalidate>
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">Admission ID</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-id-card"></i></span>
                        <input type="text" name="admission_id" class="form-control" placeholder="e.g., STU2013" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Father Phone (Password)</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-phone"></i></span>
                        <input type="text" name="parent_password" class="form-control" placeholder="Registered father phone" required>
                    </div>
                    <div class="form-text">Use the phone number saved in the student record.</div>
                </div>
                <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>

            <div class="text-center mt-3">
                <a href="{% url 'students_app:multi_login' %}" class="text-decoration-none">
                    <i class="fas fa-arrow-left me-1"></i> Back to Login Options
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
